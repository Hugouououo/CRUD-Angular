<main>
    <section class="cadastro">
    
        <h2>Cadastrar Usuário</h2>
    
        <label for="usuario">Usuário:</label>
        <input type="text" name="usuario" id="usuario">
    
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha">
    
        <input type="submit" value="Gravar" id="gravar" style="background-color: rgb(86, 255, 86);">
        <input type="submit" value="Cancelar" id="Cancelar" style="background-color: rgb(255, 83, 83);">
    
    </section>
    <section class="lista">
        <h2>Usuários Cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>

                    <td>{{ usuario}}</td>

                    <td>
                        <button type="submit" value="Deletar">🗑️</button>
                    </td>
                </tr> -->
            </tbody>
        </table>

    </section>
</main>
